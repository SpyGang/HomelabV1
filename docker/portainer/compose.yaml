services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:sts
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - ${PORT_PORT}:9443
      - ${POR2_PORT}:9000
volumes:
  portainer_data:
    name: portainer_data

networks:
  default:
    name: portainer_network
