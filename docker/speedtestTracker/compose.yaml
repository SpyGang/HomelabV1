services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    restart: unless-stopped
    container_name: speedtest-tracker
    ports:
      - ${SPE1_PORT}:80
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Recife
      - APP_KEY=${SAFE_KEYS}
      - APP_URL=http://100.86.217.115:9119
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=0 * * * *
      - SPEEDTEST_SERVERS=58812,58812,58812
      - DISPLAY_TIMEZONE=America/Recife
      - PRUNE_RESULTS_OLDER_THAN=14 
    volumes:
      - speedtest_config:/config
      - speedtest_keys:/config/keys
    networks: 
      - labnet

volumes:
  speedtest_config:
  speedtest_keys:
    
networks:
  labnet:
    external: true
